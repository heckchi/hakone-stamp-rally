<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>箱根芸術祭 スタンプラリー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap');

  :root {
    --bg: #f7f4ef;
    --ink: #1a1714;
    --accent: #8b3a2a;
    --gold: #c9a84c;
    --muted: #8a8278;
    --stamp-empty: #d9d3c9;
    --card-bg: #ffffff;
    --border: #e0d9cf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--bg);
    padding: 28px 20px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header .label { font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
  header h1 { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 600; letter-spacing: 3px; }

  /* Language switcher */
  .lang-switch {
    position: absolute; top: 12px; right: 14px;
    display: flex; gap: 4px;
  }
  .lang-btn {
    background: transparent; border: 1px solid rgba(201,168,76,0.5);
    color: var(--gold); font-size: 10px; letter-spacing: 1px;
    padding: 3px 7px; border-radius: 3px; cursor: pointer;
    font-family: 'Noto Serif JP', serif; transition: all 0.2s;
  }
  .lang-btn.active { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  /* Tab */
  .tabs { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border); }
  .tab {
    flex: 1; padding: 12px 0; text-align: center; font-size: 12px; letter-spacing: 1px;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Progress */
  .progress-wrap { padding: 16px 20px 12px; background: var(--card-bg); border-bottom: 1px solid var(--border); }
  .progress-info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .progress-info .count { font-size: 28px; font-weight: 600; color: var(--accent); font-family: 'Shippori Mincho', serif; line-height: 1; }
  .progress-info .total { font-size: 13px; color: var(--muted); }
  .progress-info .label-prog { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .progress-bar { height: 4px; background: var(--stamp-empty); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }

  /* Pages */
  .page { display: none; }
  .page.active { display: block; }

  /* Stamp grid */
  .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 16px; }
  .stamp-card {
    aspect-ratio: 1; border-radius: 8px; background: var(--card-bg); border: 1.5px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.15s; position: relative; overflow: hidden;
  }
  .stamp-card.collected { border-color: var(--accent); background: #fdf7f5; }
  .stamp-card:active { transform: scale(0.95); }
  .stamp-mark {
    width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--stamp-empty);
    display: flex; align-items: center; justify-content: center; margin-bottom: 4px; transition: all 0.3s;
  }
  .stamp-card.collected .stamp-mark { border-color: var(--accent); background: var(--accent); }
  .stamp-mark svg { opacity: 0; transition: opacity 0.3s; }
  .stamp-card.collected .stamp-mark svg { opacity: 1; }
  .stamp-number { font-size: 11px; color: var(--stamp-empty); font-weight: 600; letter-spacing: 0.5px; transition: color 0.3s; }
  .stamp-card.collected .stamp-number { color: var(--accent); }
  .stamp-name { font-size: 8px; color: var(--muted); text-align: center; padding: 0 2px; line-height: 1.3; margin-top: 2px; }
  .stamp-card.collected .stamp-name { color: var(--ink); }
  .coupon-badge {
    position: absolute; top: 4px; right: 4px; background: var(--gold); color: #fff;
    font-size: 7px; letter-spacing: 0.5px; padding: 1px 4px; border-radius: 3px; display: none;
  }
  .stamp-card.collected .coupon-badge { display: block; }

  /* Coupon list */
  .coupon-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .coupon-item {
    background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 10px;
    display: flex; align-items: stretch; overflow: hidden; cursor: pointer; transition: transform 0.15s;
  }
  .coupon-item:active { transform: scale(0.98); }
  .coupon-item.locked { opacity: 0.45; cursor: default; }
  .coupon-left {
    width: 56px; background: var(--ink); display: flex; flex-direction: column;
    align-items: center; justify-content: center; flex-shrink: 0; gap: 4px; padding: 12px 0;
  }
  .coupon-left .venue-num { font-size: 9px; color: var(--gold); letter-spacing: 1px; }
  .coupon-left .lock-icon { font-size: 18px; }
  .coupon-sep {
    width: 1px; flex-shrink: 0;
    background: repeating-linear-gradient(to bottom, var(--border) 0px, var(--border) 6px, transparent 6px, transparent 12px);
  }
  .coupon-right { padding: 12px 14px; flex: 1; }
  .coupon-right .c-label { font-size: 9px; letter-spacing: 2px; color: var(--gold); margin-bottom: 4px; }
  .coupon-right .c-title { font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .coupon-right .c-venue { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .coupon-right .c-expire { font-size: 10px; color: var(--muted); }
  .coupon-right .c-used-badge {
    display: inline-block; font-size: 10px; background: var(--stamp-empty); color: var(--muted);
    padding: 2px 8px; border-radius: 4px; margin-top: 4px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--bg); padding: 10px 20px; border-radius: 24px;
    font-size: 13px; letter-spacing: 1px; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 200; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* New coupon popup */
  .coupon-popup {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--card-bg); border: 1.5px solid var(--gold); border-radius: 12px;
    padding: 14px 20px; max-width: 280px; width: 90%; z-index: 250;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .coupon-popup.show { transform: translateX(-50%) translateY(0); }
  .coupon-popup .cp-label { font-size: 9px; letter-spacing: 3px; color: var(--gold); margin-bottom: 4px; }
  .coupon-popup .cp-title { font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 600; }
  .coupon-popup .cp-tap { font-size: 10px; color: var(--muted); margin-top: 4px; }

  /* Modals */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(26,23,20,0.85); z-index: 300;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg); border-radius: 12px; padding: 36px 24px 28px;
    max-width: 320px; width: 100%; text-align: center; position: relative;
  }
  .modal .gold-line { width: 40px; height: 2px; background: var(--gold); margin: 0 auto 16px; }
  .modal h2 { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 600; letter-spacing: 3px; margin-bottom: 8px; }
  .modal .cert-label { font-size: 10px; letter-spacing: 3px; color: var(--gold); margin-bottom: 16px; }
  .modal .cert-number, .modal .cert-date { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .modal .trophy { font-size: 48px; margin-bottom: 16px; display: block; }
  .modal-close {
    background: var(--ink); color: var(--bg); border: none; border-radius: 6px; padding: 12px 32px;
    font-family: 'Noto Serif JP', serif; font-size: 13px; letter-spacing: 2px; cursor: pointer; margin-top: 20px;
  }

  /* Coupon detail modal */
  .coupon-modal-inner { text-align: left; position: relative; }
  .coupon-modal-inner .c-tag { font-size: 9px; letter-spacing: 3px; color: var(--gold); margin-bottom: 8px; }
  .coupon-modal-inner h3 { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 600; letter-spacing: 2px; margin-bottom: 4px; }
  .coupon-modal-inner .c-venue-name { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .coupon-code-box { background: var(--ink); border-radius: 8px; padding: 18px; text-align: center; margin-bottom: 16px; }
  .coupon-code-box .code-label { font-size: 9px; letter-spacing: 3px; color: var(--gold); margin-bottom: 6px; }
  .coupon-code-box .code { font-family: 'Shippori Mincho', serif; font-size: 24px; font-weight: 600; letter-spacing: 5px; color: var(--bg); }
  .coupon-detail-desc { font-size: 13px; color: var(--ink); line-height: 1.8; margin-bottom: 12px; }
  .coupon-expire { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .use-btn {
    width: 100%; background: var(--accent); color: var(--bg); border: none;
    border-radius: 8px; padding: 14px; font-family: 'Noto Serif JP', serif; font-size: 14px; letter-spacing: 2px; cursor: pointer;
  }
  .use-btn:disabled { background: var(--stamp-empty); color: var(--muted); cursor: default; }
  .modal-x {
    position: absolute; top: -8px; right: -4px;
    background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1;
  }

  @keyframes stampIn {
    0% { transform: scale(2); opacity: 0; }
    60% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .stamp-card.animate .stamp-mark { animation: stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  .info-bar {
    padding: 12px 16px; font-size: 11px; color: var(--muted); text-align: center;
    letter-spacing: 0.5px; border-top: 1px solid var(--border); background: var(--card-bg);
  }
  .reset-btn {
    display: block; margin: 16px auto 24px; background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Noto Serif JP', serif; font-size: 11px; letter-spacing: 1px;
    padding: 6px 16px; border-radius: 4px; cursor: pointer;
  }
  .empty-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 48px 20px; line-height: 2; }
</style>
</head>

</div>

<div class="page" id="page-coupons">

</div>

<div class="toast" id="toast"></div>

<div class="coupon-popup" id="coupon-popup" onclick="openCouponFromPopup()">
  <div class="cp-label" id="cp-label"></div>
  <div class="cp-title" id="cp-title"></div>
  <div class="cp-tap" id="cp-tap"></div>
</div>

<div class="modal-overlay" id="modal-complete">

    <div class="gold-line"></div>
    <div class="cert-label" id="cert-label"></div>

    <div class="cert-date" id="cert-date"></div>
    <button class="modal-close" id="modal-close-btn" onclick="closeComplete()"></button>
  </div>
</div>

<div class="modal-overlay" id="modal-coupon">
  <div class="modal">
    <div class="coupon-modal-inner" id="coupon-modal-inner"></div>
  </div>
</div>

    couponBadge:   "Coupon",
    couponListLabel: "COUPON",
    dateFormat: (y,m,d) => `${m}/${d}/${y}`,
    venues: [
      "Hakone Geihinkan Gallery","Sculpture Forest Art Spot","Kojiri Art Pavilion",
      "Gora Park Exhibition Wing","Miyanoshita Craft Center","Kowakudani Outdoor Gallery",
      "Lake Ashi Studio","Moto-Hakone Cobblestone Gallery","Sengokuhara Meadow Stage",
      "Owakudani Lava Art Museum","Sounzan Overlook Terrace","Yumoto Machiya Gallery",
      "Sukumo River Outdoor Installation","Iruuda Garden Exhibition","Kazamatsuri Art Hall",
      "Tonosawa Gorge Gallery","Onsen District Alley Art","Hakone Checkpoint Historical Art",
      "Lakeside House Photo Gallery","Old Highway Sculpture Road","Amazake Chaya Craft Show",
      "Hakone Shrine Dedication Art","Kuzuryu Forest Installation","Glass Forest of Hakone",
      "Pola Museum Partner Exhibition"
    ],
    coupons: [
      { title:"Free Drink",               desc:"Complimentary drink at the gallery café.",                             expire:"Valid until Nov 30, 2025" },
      { title:"10% Off Catalog",          desc:"10% off exhibition catalogs at Sculpture Forest Shop.",                expire:"Valid until Nov 30, 2025" },
      { title:"¥100 Off Admission",       desc:"¥100 discount on admission to Kojiri Art Pavilion.",                  expire:"Valid until Nov 30, 2025" },
      { title:"Free Café Sweets",         desc:"Complimentary sweets at Gora Park café.",                             expire:"Valid until Nov 30, 2025" },
      { title:"¥500 Off Craft Workshop",  desc:"¥500 discount on craft workshops at Miyanoshita Craft Center.",       expire:"Valid until Nov 30, 2025" },
      { title:"Free Guided Tour",         desc:"Join a guided tour at Kowakudani venue at no charge.",                expire:"Valid until Nov 30, 2025" },
      { title:"Free Artwork Postcard",    desc:"Receive one artwork postcard at Lake Ashi Studio.",                   expire:"Valid until Nov 30, 2025" },
      { title:"Discounted Matcha Set",    desc:"Enjoy a matcha set at a special price at Moto-Hakone.",               expire:"Valid until Nov 30, 2025" },
      { title:"Priority Lawn Seating",    desc:"Reserved front-row seating at Sengokuhara Meadow Stage.",             expire:"Valid until Nov 30, 2025" },
      { title:"5% Off Souvenirs",         desc:"5% discount on souvenirs at Owakudani Art Museum Shop.",              expire:"Valid until Nov 30, 2025" },
      { title:"Priority Observation Entry",desc:"Skip the queue at Sounzan Observation Terrace.",                    expire:"Valid until Nov 30, 2025" },
      { title:"Hot Spring Discount",      desc:"¥500 off day-use hot springs at a partner inn.",                      expire:"Valid until Nov 30, 2025" },
      { title:"Free Audio Guide",         desc:"Borrow an audio guide device at Sukumo River Installation.",          expire:"Valid until Nov 30, 2025" },
      { title:"Garden Walk Privilege",    desc:"Access an exclusive route in Iruuda Garden.",                         expire:"Valid until Nov 30, 2025" },
      { title:"Concert Ticket Discount",  desc:"Discounted tickets to live events at Kazamatsuri Art Hall.",          expire:"Valid until Nov 30, 2025" },
      { title:"¥500 Off Valley Bento",    desc:"¥500 off a bento set at Tonosawa partner restaurant.",               expire:"Valid until Nov 30, 2025" },
      { title:"Free Limited Map",         desc:"Exclusive map featuring hidden spots in the onsen district.",         expire:"Valid until Nov 30, 2025" },
      { title:"Free History Guide Book",  desc:"Take home a limited-edition history guide at the Checkpoint site.",   expire:"Valid until Nov 30, 2025" },
      { title:"Free Photo Print",         desc:"Receive one print of an exhibited photo at Lakeside House.",          expire:"Valid until Nov 30, 2025" },
      { title:"Free Old Highway Guide",   desc:"A dedicated guide will lead you along the Old Highway Sculpture Road.",expire:"Valid until Nov 30, 2025" },
      { title:"Free Amazake",             desc:"Enjoy a complimentary cup of amazake (sweet sake) at Amazake Chaya.", expire:"Valid until Nov 30, 2025" },
      { title:"Free Omamori Charm",       desc:"Receive a commemorative mini omamori from Hakone Shrine.",            expire:"Valid until Nov 30, 2025" },
      { title:"Free Forest Walk Map",     desc:"Exclusive map of the hidden trail in Kuzuryu Forest.",               expire:"Valid until Nov 30, 2025" },
      { title:"10% Off Glass Items",      desc:"10% off glass accessories at Glass Forest of Hakone Shop.",           expire:"Valid until Nov 30, 2025" },
      { title:"Free Audio Guide",         desc:"Enjoy a free audio guide at the Pola Museum Partner Exhibition.",     expire:"Valid until Nov 30, 2025" },
    ],
  },
};

const KEYS = {
  0:'a1b',1:'c2d',2:'e3f',3:'g4h',4:'i5j',5:'k6l',6:'m7n',7:'o8p',8:'q9r',9:'s0t',
  10:'u1v',11:'w2x',12:'y3z',13:'a4b',14:'c5d',15:'e6f',16:'g7h',17:'i8j',18:'k9l',
  19:'m0n',20:'o1p',21:'q2r',22:'s3t',23:'u4v',24:'w5x'
};

const TOTAL = 25;
let lang        = localStorage.getItem('hakone_lang') || 'ja';
let collected   = JSON.parse(localStorage.getItem('hakone_stamps') || '[]');
let usedCoupons = JSON.parse(localStorage.getItem('hakone_used')   || '[]');
let popupVenueId = null;

function t(key) { return I18N[lang][key]; }

function save() {
  localStorage.setItem('hakone_stamps', JSON.stringify(collected));
  localStorage.setItem('hakone_used',   JSON.stringify(usedCoupons));
}

/* Language */
function setLang(l) {
  lang = l;
  localStorage.setItem('hakone_lang', lang);
  document.documentElement.lang = lang === 'ja' ? 'ja' : 'en';
  document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  applyStaticText();
  renderGrid();
  const couponPage = document.getElementById('page-coupons');
  if (couponPage.classList.contains('active')) renderCouponList();
}

function applyStaticText() {
  document.getElementById('h-label').textContent  = t('headerLabel');
  document.getElementById('h-title').innerHTML    = t('headerTitle').replace('\n','<br>');
  document.getElementById('tab-stamps').innerHTML = t('tabStamps');
  const badge = document.getElementById('coupon-count-badge');
  const badgeText = collected.length > 0 ? ` (${collected.length})` : '';
  document.getElementById('tab-coupons').innerHTML = t('tabCoupons') + `<span id="coupon-count-badge">${badgeText}</span>`;
  document.getElementById('label-prog').textContent  = t('labelProgress');
  document.getElementById('info-bar').textContent    = t('infoBar');
  document.getElementById('reset-btn').textContent   = t('resetBtn');
  document.getElementById('cp-label').textContent    = t('cpLabel');
  document.getElementById('cp-tap').textContent      = t('cpTap');
  document.getElementById('cert-label').textContent  = t('certLabel');
  document.getElementById('complete-title').textContent = t('completeTitle');
  document.getElementById('complete-msg').innerHTML  = t('completeMsg').replace('\n','<br>');
  document.getElementById('modal-close-btn').textContent = t('closeBtn');
}

/* Tab */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['stamps','coupons'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  if (tab === 'coupons') renderCouponList();
}

/* Progress */
function updateProgress() {
  const n = collected.length;
  document.getElementById('count').textContent = n;
  document.getElementById('progress-fill').style.width = (n / TOTAL * 100) + '%';
  const badge = document.getElementById('coupon-count-badge');
  if (badge) badge.textContent = n > 0 ? ` (${n})` : '';
}

/* Toast */
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* Coupon popup */
function showCouponPopup(id) {
  popupVenueId = id;
  document.getElementById('cp-title').textContent = t('coupons')[id].title;
  const p = document.getElementById('coupon-popup');
  p.classList.add('show');
  setTimeout(() => p.classList.remove('show'), 4500);
}
function openCouponFromPopup() {
  document.getElementById('coupon-popup').classList.remove('show');
  if (popupVenueId !== null) openCouponModal(popupVenueId);
}

/* Collect stamp */
function collectStamp(id, cardEl) {
  if (collected.includes(id)) { openCouponModal(id); return; }
  collected.push(id);
  save();
  cardEl.classList.add('collected','animate');
  setTimeout(() => cardEl.classList.remove('animate'), 500);
  updateProgress();
  showToast(t('toastStampPre') + t('venues')[id]);
  setTimeout(() => showCouponPopup(id), 900);
  if (collected.length === TOTAL) setTimeout(showComplete, 1800);
}

/* Stamp grid */
function renderGrid() {
  const grid = document.getElementById('stamp-grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const done = collected.includes(i);
    const card = document.createElement('div');
    card.className = 'stamp-card' + (done ? ' collected' : '');
    card.innerHTML = `
      <div class="stamp-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8l3.5 3.5 6.5-7" stroke="#f7f4ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="stamp-number">${String(i+1).padStart(2,'0')}</div>
      <div class="stamp-name">${t('venues')[i]}</div>
      <div class="coupon-badge">${t('couponBadge')}</div>
    `;
    card.addEventListener('click', () => collectStamp(i, card));
    grid.appendChild(card);
  }
}

/* Coupon list */
function renderCouponList() {
  const list = document.getElementById('coupon-list');
  list.innerHTML = '';
  if (collected.length === 0) {
    list.innerHTML = `<div class="empty-msg">${t('emptyMsg').replace('\n','<br>')}</div>`;
    return;
  }
  for (let i = 0; i < TOTAL; i++) {
    const unlocked = collected.includes(i);
    const used     = usedCoupons.includes(i);
    const cp       = t('coupons')[i];
    const item     = document.createElement('div');
    item.className = 'coupon-item' + (!unlocked ? ' locked' : '');
    item.innerHTML = `
      <div class="coupon-left">
        <div class="venue-num">${String(i+1).padStart(2,'0')}</div>
        <div class="lock-icon">${unlocked ? '🎟' : '🔒'}</div>
      </div>
      <div class="coupon-sep"></div>
      <div class="coupon-right">
        <div class="c-label">${t('couponListLabel')}</div>
        <div class="c-title">${unlocked ? cp.title : t('lockedTitle')}</div>
        <div class="c-venue">${t('venues')[i]}</div>
        ${unlocked
          ? `<div class="c-expire">${t('expirePre')}${cp.expire}</div>${used ? `<span class="c-used-badge">${t('usedText')}</span>` : ''}`
          : `<div class="c-expire">${t('lockedExpire')}</div>`
        }
      </div>
    `;
    if (unlocked) item.addEventListener('click', () => openCouponModal(i));
    list.appendChild(item);
  }
}

/* Coupon detail modal */
function openCouponModal(id) {
  const cp   = t('coupons')[id];
  const used = usedCoupons.includes(id);
  const code = 'HAK' + String(id+1).padStart(2,'0') + KEYS[id].toUpperCase();
  document.getElementById('coupon-modal-inner').innerHTML = `
    <button class="modal-x" onclick="closeCouponModal()">×</button>
    <div class="c-tag">🎟 ${t('couponListLabel')} · ${String(id+1).padStart(2,'0')}</div>
    <h3>${cp.title}</h3>
    <div class="c-venue-name">${t('venues')[id]}</div>
    <div class="coupon-code-box">
      <div class="code-label">${t('codeLabel')}</div>
      <div class="code">${code}</div>
    </div>
    <div class="coupon-detail-desc">${cp.desc}</div>
    <div class="coupon-expire">${t('expirePre')}${cp.expire}</div>
    <button class="use-btn" id="use-btn-${id}" onclick="useCoupon(${id})" ${used ? 'disabled' : ''}>
      ${used ? t('usedText') : t('useBtnText')}
    </button>
  `;
  document.getElementById('modal-coupon').classList.add('show');
}
function closeCouponModal() {
  document.getElementById('modal-coupon').classList.remove('show');
  renderCouponList();
}
function useCoupon(id) {
  if (usedCoupons.includes(id)) return;
  if (!confirm(t('confirmUse'))) return;
  usedCoupons.push(id);
  save();
  const btn = document.getElementById('use-btn-' + id);
  if (btn) { btn.disabled = true; btn.textContent = t('usedText'); }
  showToast(t('toastUsed'));
}

/* Completion */
function showComplete() {
  const now = new Date();
  const dateStr = t('dateFormat')(now.getFullYear(), now.getMonth()+1, now.getDate());
  const num = 'HAK-' + String(Math.floor(Math.random()*90000)+10000);
  document.getElementById('cert-number').textContent = t('certNumPre') + num;
  document.getElementById('cert-date').textContent   = t('certDatePre') + dateStr;
  document.getElementById('modal-complete').classList.add('show');
}
function closeComplete() { document.getElementById('modal-complete').classList.remove('show'); }

/* Reset */
function resetAll() {
  if (!confirm(t('confirmReset'))) return;
  collected = []; usedCoupons = [];
  save(); renderGrid(); updateProgress();
}

/* URL param → auto stamp */
function checkURLParam() {
  const params = new URLSearchParams(location.search);
  const venue  = params.get('venue');
  const key    = params.get('key');
  if (venue === null) return;
  const id = parseInt(venue);
  if (id >= 0 && id < TOTAL && (!key || key === KEYS[id])) {
    setTimeout(() => {
      const card = document.getElementById('stamp-grid').children[id];
      if (card) collectStamp(id, card);
    }, 600);
  }
}

setLang(lang);
updateProgress();
checkURLParam();
</script>
</body>
</html>
